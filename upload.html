<!DOCTYPE html>
<html>
<head>
<title>Upload Resume</title>
<style>
body { margin:0; font-family:Arial; }

.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    background:#2c3e50;
    padding-top:30px;
}

.sidebar a {
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
}

.sidebar a:hover {
    background:#1abc9c;
}

.main {
    margin-left:220px;
    padding:50px;
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    height:100vh;
    text-align:center;
    color:white;
}

.card {
    background:white;
    color:black;
    width:400px;
    margin:auto;
    padding:30px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="sidebar">
    <a href="/">Register</a>
    <a href="/login">Login</a>
    <a href="/upload">Upload</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
    <h1>Welcome {{ session['user'] }}</h1>

    <div class="card">
        <h2>Upload Resume</h2>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" required>
            <br><br>
            <button type="submit">Analyze Resume</button>
        </form>
    </div>
</div>

</body>
</html>
