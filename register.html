<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: #2c3e50;
    padding-top: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #1abc9c;
}

/* Main Content */
.main {
    margin-left: 220px;
    padding: 50px;
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    height: 100vh;
    color: white;
    text-align: center;
}

.card {
    background: white;
    color: black;
    width: 350px;
    margin: auto;
    padding: 30px;
    border-radius: 10px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    background:#4e73df;
    color:white;
    border:none;
}
</style>
</head>
<body>

<div class="sidebar">
    <a href="/">Register</a>
    <a href="/login">Login</a>
</div>

<div class="main">
    <h1>Intelligent Resume Analysis System</h1>

    <div class="card">
        <h2>Register</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p style="color:green;">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="name" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>
</div>

</body>
</html>
